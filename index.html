<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Puerto Rican Entrepreneurial Ecosystem</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Fraunces:wght@400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:rgba(255,255,255,0.08);
  --text:#e6edf3;--muted:#8b949e;--accent:#f0b429;--green:#3fb950;
  --hover:rgba(240,180,41,0.15);--active:rgba(240,180,41,0.28);
  --r:14px;--rs:8px;--shadow:0 8px 40px rgba(0,0,0,0.5);
  --ease:all 0.35s cubic-bezier(0.4,0,0.2,1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden}

#hdr{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:10px 22px;background:rgba(13,17,23,0.88);backdrop-filter:blur(16px);border-bottom:1px solid var(--border)}
#hdr h1{font-family:'Fraunces',serif;font-size:1rem;font-weight:700;color:var(--accent);letter-spacing:0.01em}
#hdr p{font-size:0.68rem;color:var(--muted);margin-top:1px}
#back{display:none;align-items:center;gap:7px;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:99px;font-size:0.76rem;font-weight:500;cursor:pointer;transition:var(--ease);font-family:inherit}
#back:hover{background:var(--hover);border-color:var(--accent)}
#back svg{width:13px;height:13px}

#outer{position:fixed;top:52px;left:0;right:0;bottom:0;overflow:hidden}
#container{position:absolute;width:100%;height:100%;transform-origin:0 0;transition:transform 0.55s cubic-bezier(0.4,0,0.2,1)}
#mapimg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:contain;pointer-events:none;display:block}
#slayer{position:absolute;top:0;left:0;width:100%;height:100%}

.sr{position:absolute;border-radius:var(--r);border:2px solid transparent;cursor:pointer;transition:background 0.22s ease,border-color 0.22s ease,box-shadow 0.22s ease;}
.sr:hover{background:var(--hover);border-color:var(--accent);box-shadow:0 0 0 4px rgba(240,180,41,0.08)}
.sr.active{background:var(--active);border-color:var(--accent);box-shadow:0 0 0 6px rgba(240,180,41,0.12)}

#sb{position:fixed;top:52px;right:0;bottom:0;width:380px;max-width:92vw;background:var(--surface);border-left:1px solid var(--border);transform:translateX(100%);transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;z-index:50;overflow:hidden;box-shadow:-8px 0 40px rgba(0,0,0,0.4);}
#sb.open{transform:translateX(0)}
#sb-head{padding:18px 18px 12px;border-bottom:1px solid var(--border);flex-shrink:0}
#sb-name{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:700;color:var(--accent);line-height:1.2;margin-bottom:3px}
#sb-count{font-size:0.7rem;color:var(--muted)}
#sb-search{padding:10px 14px;flex-shrink:0;border-bottom:1px solid var(--border)}
#sb-search input{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:7px 11px;color:var(--text);font-family:inherit;font-size:0.8rem;outline:none;transition:border-color 0.2s}
#sb-search input::placeholder{color:var(--muted)}
#sb-search input:focus{border-color:var(--accent)}
#alist{overflow-y:auto;flex:1;padding:10px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#alist::-webkit-scrollbar{width:3px}
#alist::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* asset cards */
.card{padding:12px 14px;border-radius:var(--rs);border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:var(--ease);background:var(--surface2);animation:sli 0.28s ease both;position:relative;}
.card:hover{border-color:rgba(240,180,41,0.4);background:rgba(240,180,41,0.04);transform:translateX(3px)}
.card.nolink{opacity:0.65;cursor:default}
.card.nolink:hover{transform:none;border-color:var(--border);background:var(--surface2)}
.cn{font-size:0.83rem;font-weight:600;color:var(--text);line-height:1.3;margin-bottom:2px}
.cd{font-size:0.7rem;color:var(--muted);line-height:1.4}
.has-notes{font-size:0.65rem;color:var(--green);margin-top:4px;display:flex;align-items:center;gap:4px}
.has-notes::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--green);flex-shrink:0}
.clb{position:absolute;top:10px;right:10px;width:16px;height:16px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s}
.clb svg{width:8px;height:8px;fill:#000}
.card:hover .clb{opacity:1}
@keyframes sli{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* group / child cards */
#group-view{padding:12px;display:none;flex-direction:column;gap:7px;overflow-y:auto;flex:1}
.group-desc{font-size:0.78rem;color:var(--muted);line-height:1.6;padding:0 2px 10px;border-bottom:1px solid var(--border);margin-bottom:2px}
.child-card{display:flex;align-items:center;justify-content:space-between;padding:13px 15px;border-radius:var(--rs);border:1px solid var(--border);background:var(--surface2);cursor:pointer;transition:var(--ease);animation:sli 0.28s ease both;}
.child-card:hover{border-color:rgba(240,180,41,0.5);background:rgba(240,180,41,0.06);transform:translateX(3px)}
.child-card-name{font-size:0.86rem;font-weight:600;color:var(--text);margin-bottom:2px}
.child-card-count{font-size:0.68rem;color:var(--muted)}
.child-card-arrow{color:var(--accent);font-size:1rem;opacity:0.7;transition:opacity 0.2s,transform 0.2s;flex-shrink:0;margin-left:10px}
.child-card:hover .child-card-arrow{opacity:1;transform:translateX(3px)}

/* ── SUMMARY STATS VIEW (center bubble) ── */
#stats-view{padding:14px 12px;display:none;flex-direction:column;gap:0;overflow-y:auto;flex:1}
.stats-intro{font-size:0.8rem;color:var(--muted);line-height:1.65;padding:0 2px 12px;border-bottom:1px solid var(--border);margin-bottom:12px}
.stats-intro strong{color:var(--text)}
.stat-row{display:flex;gap:8px;margin-bottom:8px}
.stat-box{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;text-align:center}
.stat-num{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:700;color:var(--accent);line-height:1}
.stat-label{font-size:0.65rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.05em}
.group-block{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:13px 15px;margin-bottom:7px;animation:sli 0.28s ease both;}
.group-block-title{font-size:0.82rem;font-weight:700;color:var(--accent);margin-bottom:5px;display:flex;align-items:center;gap:7px}
.group-block-title span{font-size:0.65rem;color:var(--muted);font-weight:400}
.group-block-why{font-size:0.75rem;color:var(--muted);line-height:1.55;margin-bottom:7px}
.group-block-children{display:flex;flex-wrap:wrap;gap:5px}
.sector-pill{background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.25);color:var(--accent);font-size:0.63rem;font-weight:600;padding:2px 9px;border-radius:99px;cursor:pointer;transition:var(--ease)}
.sector-pill:hover{background:rgba(240,180,41,0.22);border-color:var(--accent)}

/* modal */
#mo{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.65);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s;padding:20px}
#mo.vis{opacity:1;pointer-events:all}
#md{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:26px 26px 22px;max-width:500px;width:100%;box-shadow:var(--shadow);transform:translateY(18px) scale(0.97);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);position:relative;max-height:85vh;display:flex;flex-direction:column}
#mo.vis #md{transform:translateY(0) scale(1)}
#mc{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1px solid var(--border);cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;transition:var(--ease);font-size:0.9rem}
#mc:hover{color:var(--accent);background:var(--hover)}
#mbadge{display:inline-flex;align-items:center;background:rgba(240,180,41,0.1);border:1px solid rgba(240,180,41,0.28);color:var(--accent);font-size:0.65rem;font-weight:600;padding:2px 9px;border-radius:99px;letter-spacing:0.05em;text-transform:uppercase;margin-bottom:9px;max-width:fit-content}
#mname{font-family:'Fraunces',serif;font-size:1.3rem;font-weight:700;line-height:1.25;margin-bottom:5px;color:var(--text);padding-right:28px}
#mdesc{font-size:0.78rem;color:var(--muted);margin-bottom:12px}
#mnotes-wrap{flex:1;overflow-y:auto;margin-bottom:16px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
#mnotes-wrap::-webkit-scrollbar{width:3px}
#mnotes-wrap::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#mnotes{font-size:0.82rem;color:var(--text);line-height:1.7;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:13px 15px;white-space:pre-wrap}
#mact{flex-shrink:0;padding-top:14px;border-top:1px solid var(--border)}
#mlink{display:inline-flex;align-items:center;gap:7px;background:var(--accent);color:#000;font-weight:700;font-size:0.8rem;font-family:inherit;padding:9px 18px;border-radius:99px;text-decoration:none;transition:var(--ease)}
#mlink:hover{background:#ffc947;transform:translateY(-1px);box-shadow:0 4px 16px rgba(240,180,41,0.3)}
#mlink svg{width:12px;height:12px}
#mnolink{display:inline-flex;align-items:center;gap:7px;background:var(--surface2);color:var(--muted);font-size:0.8rem;padding:9px 18px;border-radius:99px;border:1px solid var(--border)}

#leg{position:fixed;bottom:18px;left:18px;z-index:60;background:rgba(13,17,23,0.88);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:var(--r);padding:11px 14px;font-size:0.68rem;color:var(--muted);line-height:1.6;max-width:185px}
#leg strong{display:block;color:var(--text);font-size:0.72rem;margin-bottom:5px}
.tip{display:flex;align-items:flex-start;gap:5px;margin-bottom:2px}
.tip::before{content:"▸";color:var(--accent);flex-shrink:0}
#toast{position:fixed;bottom:18px;right:18px;z-index:300;background:var(--surface);border:1px solid var(--accent);color:var(--text);padding:9px 16px;border-radius:99px;font-size:0.75rem;font-weight:500;transform:translateY(55px);opacity:0;transition:all 0.32s cubic-bezier(0.4,0,0.2,1);pointer-events:none}
#toast.show{transform:translateY(0);opacity:1}
@media(max-width:640px){
  #sb{width:100%;max-width:100%;top:auto;bottom:0;height:68vh;border-left:none;border-top:1px solid var(--border);transform:translateY(100%)}
  #sb.open{transform:translateY(0)}
  #leg{display:none}
}
</style>
</head>

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let active = null, curAssets = [], tmr;

function allPanelsOff() {
  document.getElementById('alist').style.display      = 'none';
  document.getElementById('sb-search').style.display  = 'none';
  document.getElementById('group-view').style.display = 'none';
  document.getElementById('group-view').innerHTML     = '';
  document.getElementById('stats-view').style.display = 'none';
  document.getElementById('stats-view').innerHTML     = '';
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
function init() {
  const layer = document.getElementById('slayer');
  REGIONS.forEach(r => {
    const el = document.createElement('div');
    el.className = 'sr';
    el.setAttribute('data-key', r.key);
    el.style.cssText = `top:${r.top}%;left:${r.left}%;width:${r.width}%;height:${r.height}%`;
    el.addEventListener('click', () => openSector(r.key, el));
    layer.appendChild(el);
  });
}

// ═══════════════════════════════════════
// OPEN SECTOR
// ═══════════════════════════════════════
function openSector(key, el) {
  document.querySelectorAll('.sr').forEach(r => r.classList.remove('active'));
  if(el) el.classList.add('active');
  active = key;
  allPanelsOff();

  if(key === '__ecosystem__') {
    showEcosystem();
  } else if(GROUPS[key]) {
    showGroup(key);
  } else {
    showAssets(key);
  }

  document.getElementById('sb').classList.add('open');
  document.getElementById('back').style.display = 'flex';
  if(el) zoom(el);
}

// ─── ECOSYSTEM SUMMARY ───────────────────────────
function showEcosystem() {
  const totalOrgs  = Object.values(DATA).reduce((s,v)=>s+v.length, 0);
  const totalSects = Object.keys(DATA).length;
  const withNotes  = Object.values(DATA).flat().filter(o=>o.notes).length;

  document.getElementById('sb-name').textContent  = 'PR Entrepreneurial Ecosystem';
  document.getElementById('sb-count').textContent = 'Full overview';

  const sv = document.getElementById('stats-view');
  sv.style.display = 'flex';

  sv.innerHTML = `
    <div class="stats-intro">
      The <strong>Puerto Rican Entrepreneurial Ecosystem</strong> map captures
      <strong>${totalOrgs} organizations</strong> across <strong>${totalSects} sectors</strong>,
      organized into 4 strategic groups. Each group plays a distinct role in supporting
      Puerto Rican founders — both on the island and in the diaspora.
    </div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${totalOrgs}</div><div class="stat-label">Organizations</div></div>
      <div class="stat-box"><div class="stat-num">${totalSects}</div><div class="stat-label">Sectors</div></div>
      <div class="stat-box"><div class="stat-num">${withNotes}</div><div class="stat-label">With Notes</div></div>
    </div>
  `;

  ECOSYSTEM.groups.forEach((g, i) => {
    const totalInGroup = g.children.reduce((s, c) => s + (DATA[c]||[]).length, 0);
    const block = document.createElement('div');
    block.className = 'group-block';
    block.style.animationDelay = `${i*0.07}s`;
    block.innerHTML = `
      <div class="group-block-title">
        ${g.name}
        <span>${g.children.length} sectors · ${totalInGroup} orgs</span>
      </div>
      <div class="group-block-why">${g.why}</div>
      <div class="group-block-children">
        ${g.children.map(c => `<span class="sector-pill" onclick="drillFromEco('${c.replace(/'/g,"\'")}')">
          ${c}
        </span>`).join('')}
      </div>
    `;
    sv.appendChild(block);
  });

  toast('Ecosystem overview loaded');
}

function drillFromEco(sectorKey) {
  const regionEl = document.querySelector(`.sr[data-key="${CSS.escape(sectorKey)}"]`);
  openSector(sectorKey, regionEl);
}

// ─── GROUP VIEW ──────────────────────────────────
function showGroup(key) {
  const group = GROUPS[key];
  document.getElementById('sb-name').textContent  = key;
  document.getElementById('sb-count').textContent = `${group.children.length} sectors`;

  const gv = document.getElementById('group-view');
  gv.style.display = 'flex';
  gv.innerHTML = `<div class="group-desc">${group.description}</div>`;

  group.children.forEach((child, i) => {
    const count = (DATA[child]||[]).length;
    const card  = document.createElement('div');
    card.className = 'child-card';
    card.style.animationDelay = `${i*0.05}s`;
    card.innerHTML = `
      <div>
        <div class="child-card-name">${child}</div>
        <div class="child-card-count">${count} organization${count!==1?'s':''}</div>
      </div>
      <div class="child-card-arrow">→</div>`;
    card.addEventListener('click', () => {
      const regionEl = document.querySelector(`.sr[data-key="${CSS.escape(child)}"]`);
      openSector(child, regionEl);
    });
    gv.appendChild(card);
  });

  toast(`${group.children.length} sectors in ${key}`);
}

// ─── ASSET LIST ──────────────────────────────────
function showAssets(key) {
  curAssets = DATA[key] || [];
  document.getElementById('sb-name').textContent  = key;
  document.getElementById('sb-count').textContent = `${curAssets.length} organization${curAssets.length!==1?'s':''}`;
  document.getElementById('alist').style.display      = 'block';
  document.getElementById('sb-search').style.display  = 'block';
  document.getElementById('sinput').value = '';
  renderCards(curAssets);
  toast(`${curAssets.length} organizations in ${key}`);
}

// ═══════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════
function zoom(el) {
  const outer = document.getElementById('outer');
  const cont  = document.getElementById('container');
  const or = outer.getBoundingClientRect();
  const er = el.getBoundingClientRect();
  const scale = 2.1;
  const tx = (or.width/2  - (er.left + er.width/2  - or.left)*scale)/scale;
  const ty = (or.height/2 - (er.top  + er.height/2 - or.top )*scale)/scale;
  cont.style.transform = `scale(${scale}) translate(${tx}px,${ty}px)`;
}

function reset() {
  document.getElementById('container').style.transform = '';
  document.getElementById('sb').classList.remove('open');
  document.getElementById('back').style.display = 'none';
  document.querySelectorAll('.sr').forEach(r => r.classList.remove('active'));
  allPanelsOff();
  document.getElementById('alist').style.display = 'block';
  document.getElementById('sb-search').style.display = 'block';
  active = null;
}

// ═══════════════════════════════════════
// RENDER CARDS
// ═══════════════════════════════════════
function renderCards(assets) {
  const list = document.getElementById('alist');
  list.innerHTML = '';
  if(!assets.length) {
    list.innerHTML = '<p style="color:var(--muted);font-size:0.78rem;padding:20px;text-align:center">No organizations found.</p>';
    return;
  }
  assets.forEach((a,i) => {
    const c = document.createElement('div');
    c.className = 'card' + (a.link ? '' : ' nolink');
    c.style.animationDelay = `${i*0.035}s`;
    c.innerHTML = `
      <div class="cn">${a.name}</div>
      <div class="cd">${a.description || ''}</div>
      ${a.notes ? '<div class="has-notes">Has notes</div>' : ''}
      ${a.link ? '<div class="clb"><svg viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></div>' : ''}
    `;
    c.addEventListener('click', () => openModal(a));
    list.appendChild(c);
  });
}

// ═══════════════════════════════════════
// FILTER
// ═══════════════════════════════════════
function filterAssets(q) {
  q = q.toLowerCase().trim();
  renderCards(q ? curAssets.filter(a =>
    a.name.toLowerCase().includes(q) ||
    (a.description && a.description.toLowerCase().includes(q)) ||
    (a.notes && a.notes.toLowerCase().includes(q))
  ) : curAssets);
}

// ═══════════════════════════════════════
// MODAL
// ═══════════════════════════════════════
function openModal(a) {
  document.getElementById('mbadge').textContent = active;
  document.getElementById('mname').textContent  = a.name;
  document.getElementById('mdesc').textContent  = a.description || '';
  const nw = document.getElementById('mnotes-wrap');
  if(a.notes) { document.getElementById('mnotes').textContent = a.notes; nw.style.display='block'; }
  else { nw.style.display='none'; }
  const act = document.getElementById('mact');
  act.innerHTML = a.link
    ? `<a id="mlink" href="${a.link}" target="_blank" rel="noopener noreferrer">Visit Website <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3"/></svg></a>`
    : `<span id="mnolink">No website available</span>`;
  document.getElementById('mo').classList.add('vis');
}

function closeMo(e) {
  if(!e || e.target===document.getElementById('mo') || e.currentTarget===document.getElementById('mc'))
    document.getElementById('mo').classList.remove('vis');
}

// ═══════════════════════════════════════
// TOAST
// ═══════════════════════════════════════
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(tmr); tmr = setTimeout(()=>t.classList.remove('show'), 2600);
}

document.addEventListener('keydown', e => {
  if(e.key==='Escape') {
    if(document.getElementById('mo').classList.contains('vis')) closeMo({target:document.getElementById('mo')});
    else reset();
  }
});

init();
</script>
